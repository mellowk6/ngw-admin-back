################
### 공통 설정 ###
###############
server:
  port: 8081
  servlet:
    session:
      timeout: 30m
      cookie:
        name: ADMIN_SESSION
        http-only: true
        secure: false # dev 프로필에서 true로 override
        same-site: Lax

spring:
  application:
    name: ngw-admin-back
  session:
    store-type: none

  profiles:
    active: local

ngw:
  base-url: http://ngw-internal.svc.cluster.local
  service-key: ${NGW_SERVICE_KEY:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 하이버네이트 DDL 로그레벨
logging:
  level:
    org.hibernate.tool.hbm2ddl: ERROR
    org.hibernate.tool.schema: ERROR

---

##################
### local 설정 ###
#################
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:file:./.localdb/ngw;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update # 엔티티 기반으로 테이블 자동 생성/업데이트
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

---

################
### dev 설정 ###
###############
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ngw?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:ngw}
    password: ${DB_PASSWORD:change-me}

  jpa:
    hibernate:
      ddl-auto: validate # 운영은 스키마 자동 변경 금지 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}

# 운영 보안 쿠키 강화
server:
  servlet:
    session:
      cookie:
        secure: true
        same-site: Lax
# ---------------------------------------------------------------------------------------