server:
  port: 8081
  servlet:
    session:
      timeout: 30m
      cookie:
        name: ADMIN_SESSION
        http-only: true
        secure: false
        same-site: Lax

spring:
  application:
    name: admin-bff
  session:
    store-type: none

ngw:
  base-url: http://ngw-internal.svc.cluster.local
  service-key: ${NGW_SERVICE_KEY:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
